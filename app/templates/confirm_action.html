{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-6">
    <div class="card bg-dark text-white border-warning">
      <div class="card-header bg-warning text-dark">
        <h4 class="mb-0"><i class="fas fa-exclamation-triangle mr-2"></i>Confirm: {{ action_label }}</h4>
      </div>
      <div class="card-body">
        <p class="card-text">{{ warning }}</p>
        <p class="text-muted">Are you sure you want to proceed?</p>
        <form method="POST" action="/{{ action }}">
          <button type="submit" class="btn btn-danger mr-2">
            <i class="fas fa-check mr-1"></i>Yes, {{ action_label }}
          </button>
          <a href="/" class="btn btn-secondary">
            <i class="fas fa-times mr-1"></i>Cancel
          </a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
